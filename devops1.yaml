trigger:
  branches:
    include:
      - main   # Runs pipeline when code is pushed to main branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:
# ---------------- BUILD STAGE ----------------
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    displayName: "Build Job"
    steps:
    - checkout: self

    - task: UseNode@1
      inputs:
        version: '18.x'
      displayName: "Install Node.js"

    - script: |
        npm ci
        npm run build
      displayName: "Install dependencies and build"

# ---------------- TEST STAGE ----------------
- stage: Test
  displayName: "Test Stage"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    displayName: "Test Job"
    steps:
    - checkout: self

    - task: UseNode@1
      inputs:
        version: '18.x'

    - script: |
        npm ci
        npm test
      displayName: "Run Tests"

# ---------------- DEPLOY STAGE ----------------
- stage: Deploy
  displayName: "Deploy Stage"
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: DeployJob
    displayName: "Deploy Job"
    steps:
    - checkout: self

    - script: |
        echo "Deploying application..."
      displayName: "Deploy Step"
